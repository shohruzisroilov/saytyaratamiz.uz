<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4ff"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle circles -->
  <circle cx="100" cy="100" r="200" fill="#2563eb" opacity="0.04"/>
  <circle cx="1100" cy="530" r="250" fill="#38bdf8" opacity="0.06"/>
  <!-- Logo square -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#2563eb"/>
  <text x="112" y="122" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">S</text>
  <!-- Brand name -->
  <text x="160" y="114" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#0f172a">SaytYaratamiz</text>
  <text x="160" y="138" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">.uz</text>
  <!-- Main heading -->
  <text x="80" y="290" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#0f172a">Professional Sayt</text>
  <text x="80" y="360" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="url(#grad)">Yaratish Xizmati</text>
  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#64748b">O'zbekistonda №1 veb studiya — 150+ loyiha, bepul konsultatsiya</text>
  <!-- Stats chips -->
  <rect x="80" y="490" width="160" height="44" rx="22" fill="#2563eb"/>
  <text x="160" y="518" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">150+ Loyiha</text>
  <rect x="256" y="490" width="180" height="44" rx="22" fill="#0f172a"/>
  <text x="346" y="518" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">120+ Mijoz</text>
  <rect x="452" y="490" width="180" height="44" rx="22" fill="#f0f4ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="542" y="518" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#2563eb" text-anchor="middle">4.9 ★ Reyting</text>
</svg>
